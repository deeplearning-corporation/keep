<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep C/C++ 编译器</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2b2b2b, #1e1e1e);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 2rem;
        }
        .download-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            margin: 2rem 0;
        }
        .download-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        .info {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: left;
            margin-top: 2rem;
        }
        .info h3 {
            margin-top: 0;
        }
        .info pre {
            background: #000;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
        }
        .footer {
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Keep 编译器</h1>
        <div class="subtitle">轻量 · 高效 · 纯 C/C++</div>
        
        <button class="download-btn" id="downloadBtn">⬇️ 下载 keep 编译器</button>
        
        <div class="info">
            <h3>📦 最新版本：v1.0.0</h3>
            <p>🔹 支持 C89/C99/C11/C++98/C++11/C++14/C++17</p>
            <p>🔹 输出 Windows PE 格式 (`.exe`)</p>
            <p>🔹 无需运行时，单文件编译</p>
            <p>🔹 由 Deep Learning Corporation 开发</p>
            <pre>c.exe hello.c -o hello.exe</pre>
        </div>

        <div class="footer">
            Deep Learning Corporation © 2026 · <a href="https://github.com/deeplearning-corporation/keep" style="color: #888;">GitHub</a>
        </div>
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function() {
            // 从 GitHub Releases 下载 setup 安装包
            const version = 'v1.0.0';  // 你的版本号
            const repo = 'deeplearning-corporation/keep';
            const filename = 'keep-compiler-release-x64-setup.exe';
            
            // 构建下载链接
            const downloadUrl = `https://github.com/${repo}/releases/download/${version}/${filename}`;
            
            // 创建隐藏的 a 标签触发下载
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
